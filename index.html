<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depot Nigerian Army — Leadership</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
  <script src="data.js"></script>
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/images/no_going_back_depot_10s.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <nav class="navbar">
    <img src="assets/images/logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
    <div class="brand">
      <span class="brand-main">NIGERIAN ARMY DEPOT</span>
      <span class="brand-sub">Leadership</span>
    </div>
  </nav>

  <!-- ── HOME SCREEN ── -->
  <div class="screen active" id="screen-home">
    <div class="home-body">
      <button class="role-card" onclick="showScreen('commandants')">
        <div class="role-card-inner">
          <div class="role-title">Commandants</div>
          <div class="role-cta">Tap to explore <span class="role-arrow">→</span></div>
        </div>
      </button>

      <button class="role-card" onclick="showScreen('deputies')">
        <div class="role-card-inner">
          <div class="role-title">Deputy Commandants</div>
          <div class="role-cta">Tap to explore <span class="role-arrow">→</span></div>
        </div>
      </button>
    </div>
  </div>

  <!-- ── COMMANDANTS SCREEN ── -->
  <div class="screen" id="screen-commandants">
    <button class="back-btn" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Back</span>
    </button>

    <div class="role-screen-body">
      <div class="current-section">
        <div class="section-label">Current Commandant</div>
        <div class="hero-strip" id="cmd-hero-strip">
          <div class="photo-frame">
            <img id="cmd-photo" src="" alt="" class="leader-photo">
            <div class="photo-shine" aria-hidden="true"></div>
          </div>
          <div class="hero-info">
            <div class="hero-role">Commandant</div>
            <div class="hero-rank" id="cmd-rank"></div>
            <h1 class="hero-name" id="cmd-name"></h1>
            <div class="hero-subtitle" id="cmd-subtitle"></div>
            <div class="hero-appt" id="cmd-appt"></div>
            <div class="hero-decorations" id="cmd-dec"></div>
          </div>
        </div>
        <div class="bio-card glass-panel">
          <div class="bio-scroll" id="cmd-bio-scroll"></div>
        </div>
      </div>

      <div class="past-section">
        <div class="section-label">Past Commandants</div>
        <div class="past-list" id="cmd-past-list"></div>
      </div>
    </div>
  </div>

  <!-- ── DEPUTIES SCREEN ── -->
  <div class="screen" id="screen-deputies">
    <button class="back-btn" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Back</span>
    </button>

    <div class="role-screen-body">
      <div class="current-section">
        <div class="section-label">Current Deputy Commandant</div>
        <div class="hero-strip" id="dep-hero-strip">
          <div class="photo-frame">
            <img id="dep-photo" src="" alt="" class="leader-photo">
            <div class="photo-shine" aria-hidden="true"></div>
          </div>
          <div class="hero-info">
            <div class="hero-role">Deputy Commandant</div>
            <div class="hero-rank" id="dep-rank"></div>
            <h1 class="hero-name" id="dep-name"></h1>
            <div class="hero-subtitle" id="dep-subtitle"></div>
            <div class="hero-appt" id="dep-appt"></div>
            <div class="hero-decorations" id="dep-dec"></div>
          </div>
        </div>
        <div class="bio-card glass-panel">
          <div class="bio-scroll" id="dep-bio-scroll"></div>
        </div>
      </div>

      <div class="past-section">
        <div class="section-label">Past Deputy Commandants</div>
        <div class="past-list" id="dep-past-list"></div>
      </div>
    </div>
  </div>

  <!-- ── PAST LEADER MODAL ── -->
  <div class="bio-modal" id="bio-modal" aria-hidden="true">
    <div class="bio-modal-panel glass-panel">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <div class="hero-strip" id="modal-hero-strip">
        <div class="photo-frame">
          <img id="modal-photo" src="" alt="" class="leader-photo">
          <div class="photo-shine" aria-hidden="true"></div>
        </div>
        <div class="hero-info">
          <div class="hero-rank" id="modal-rank"></div>
          <h2 class="hero-name" id="modal-name"></h2>
          <div class="hero-subtitle" id="modal-subtitle"></div>
          <div class="hero-appt" id="modal-tenure"></div>
          <div class="hero-decorations" id="modal-dec"></div>
        </div>
      </div>
      <div class="bio-scroll modal-bio-scroll" id="modal-bio-scroll"></div>
    </div>
  </div>

  <script>
  (function () {
    var DATA = null;

    function setText(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = val || '';
    }
    function setAttr(id, attr, val) {
      var el = document.getElementById(id);
      if (el) el[attr] = val || '';
    }

    function renderBio(scrollId, bioArr) {
      var el = document.getElementById(scrollId);
      if (!el) return;
      el.innerHTML = (bioArr || []).map(function (s) {
        return '<div class="bio-section">' +
          '<div class="bio-section-label">' + s.label + '</div>' +
          '<p class="bio-para">' + s.text + '</p>' +
          '</div>';
      }).join('');
    }

    function renderPastList(listId, pastArr, roleLabel) {
      var el = document.getElementById(listId);
      if (!el) return;
      if (!pastArr || !pastArr.length) {
        el.innerHTML = '<p class="past-empty">No past ' + roleLabel + ' on record yet.</p>';
        return;
      }
      el.innerHTML = pastArr.map(function (p, i) {
        return '<button class="past-card" onclick="openModal(\'' + listId + '\',' + i + ')">' +
          '<div class="past-photo-wrap">' +
            '<img src="' + (p.photo || '') + '" alt="' + p.name + '" class="past-thumb" onerror="this.style.display=\'none\'">' +
          '</div>' +
          '<div class="past-card-info">' +
            '<div class="past-card-rank">' + (p.rank || '') + '</div>' +
            '<div class="past-card-name">' + (p.name || '') + '</div>' +
            '<div class="past-card-tenure">' + (p.tenure || '') + '</div>' +
          '</div>' +
          '<div class="past-card-cta">View Bio →</div>' +
        '</button>';
      }).join('');
    }

    function populateCommandants() {
      var c = DATA.commandants.current;
      setAttr('cmd-photo', 'src', c.photo);
      setAttr('cmd-photo', 'alt', c.name);
      setText('cmd-rank', c.rank);
      setText('cmd-name', c.name);
      setText('cmd-subtitle', c.subtitle);
      setText('cmd-appt', 'Appointed ' + c.appointed);
      setText('cmd-dec', c.decorations);
      renderBio('cmd-bio-scroll', c.bio);
      renderPastList('cmd-past-list', DATA.commandants.past, 'Commandants');
    }

    function populateDeputies() {
      var d = DATA.deputies.current;
      setAttr('dep-photo', 'src', d.photo);
      setAttr('dep-photo', 'alt', d.name);
      setText('dep-rank', d.rank);
      setText('dep-name', d.name);
      setText('dep-subtitle', d.subtitle);
      setText('dep-appt', 'Appointed ' + d.appointed);
      setText('dep-dec', d.decorations);
      renderBio('dep-bio-scroll', d.bio);
      renderPastList('dep-past-list', DATA.deputies.past, 'Deputy Commandants');
    }

    /* ── Navigation ── */
    window.showScreen = function (id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + id).classList.add('active');
    };

    /* ── Past leader modal ── */
    var _modalSource = null;

    window.openModal = function (listId, idx) {
      var pastArr = listId === 'cmd-past-list'
        ? DATA.commandants.past
        : DATA.deputies.past;
      var p = pastArr[idx];
      if (!p) return;
      _modalSource = { listId: listId, idx: idx };
      setAttr('modal-photo', 'src', p.photo || '');
      setAttr('modal-photo', 'alt', p.name || '');
      setText('modal-rank', p.rank || '');
      setText('modal-name', p.name || '');
      setText('modal-subtitle', p.subtitle || '');
      setText('modal-tenure', p.tenure || '');
      setText('modal-dec', p.decorations || '');
      renderBio('modal-bio-scroll', p.bio || []);
      var modal = document.getElementById('bio-modal');
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    };

    window.closeModal = function () {
      var modal = document.getElementById('bio-modal');
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    };

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeModal();
    });

    /* ── Bootstrap ── */
    function init(d) {
      DATA = d;
      populateCommandants();
      populateDeputies();
    }
    if (typeof LEADERS_DATA !== 'undefined') {
      init(LEADERS_DATA);
    } else {
      fetch('data.json').then(function (r) { return r.json(); }).then(init);
    }
  })();
  </script>

</body>
</html>
